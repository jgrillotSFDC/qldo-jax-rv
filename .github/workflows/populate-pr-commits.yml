name: Populate PR Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  populate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Populate commit list in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const commitLines = commits
              .map(c => `- \`${c.sha.slice(0, 7)}\` ${c.commit.message.split('\n')[0]}`)
              .join('\n');

            const placeholder = '<!-- COMMITS_PLACEHOLDER -->';
            const currentBody = pr.body ?? '';

            if (!currentBody.includes(placeholder)) {
              core.info('Placeholder not found in PR body — skipping update.');
              return;
            }

            const updatedBody = currentBody.replace(placeholder, commitLines);

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: updatedBody,
            });

            core.info(`Updated PR body with ${commits.length} commit(s).`);
